model:
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 512
  dropout: 0.1

training:
  seed: 42
  batch_size: 512
  max_epochs: 50
  patience: 7
  lr: 3.0e-4
  weight_decay: 0.01
  label_smoothing: 0.02
  lambda_tera: 0.5
  require_both_actions: false
  autoregressive: true
  num_workers: 4

data:
  split_dir: data/assembled
  vocab_path: null
